<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
html,body{height:100%;overflow:hidden;background:#F7F6F2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#root{height:100%;display:flex;flex-direction:column;direction:rtl;color:#1A1A18;padding-top:var(--st)}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#F7F6F2;padding-bottom:calc(62px + var(--sb))}
.tnav{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1.5px solid #E0DED6;display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:52px;flex-shrink:0}
.logo{font-size:20px;font-weight:700;color:#1A1A18;letter-spacing:-.5px}.logo span{color:#BA7517}
.bb{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#1A1A18;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.tbar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#fff;border-top:1.5px solid #E0DED6;display:flex;padding-bottom:var(--sb)}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;cursor:pointer;gap:3px;border:none;background:transparent}
.ti svg{width:22px;height:22px}
.ti span{font-size:10px;font-weight:600}
.ti.on{color:#1A1A18}.ti:not(.on){color:#AAA}
.card{background:#fff;border:1px solid #E0DED6;border-radius:12px;padding:14px}
.tag{display:inline-block;padding:3px 9px;border-radius:9px;font-size:11px;font-weight:700}
.fi{width:100%;padding:10px 12px;border:1.5px solid #C8C6BE;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:#1A1A18;direction:rtl;-webkit-appearance:none}
.fi:focus{outline:none;border-color:#1A1A18}
.fl{font-size:12px;color:#555;font-weight:700;display:block;margin-bottom:5px}
.btn{width:100%;padding:13px;background:#1A1A18;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn:active{opacity:.85}
.sn{width:26px;height:26px;border-radius:50%;background:#1A1A18;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* recipe preview card for search results */
.rp-card{background:#fff;border:1.5px solid #E0DED6;border-radius:14px;margin:0 14px 12px;overflow:hidden}
.rp-header{padding:14px 14px 10px}
.rp-actions{display:flex;gap:8px;padding:0 14px 14px}
.rp-btn-add{flex:1;padding:11px;background:#27500A;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.rp-btn-skip{padding:11px 14px;background:#fff;color:#555;border:2px solid #C8C6BE;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
/* OCR progress */
.ocr-bar{background:#F0F9FF;border:1.5px solid #BFDBFE;border-radius:10px;padding:12px 14px}
</style>
</head>

const IC={};
function gi(id,w,h,s=''){
  const k=`${id}_${w}_${h}`;
  if(!IC[k]){const c=document.getElementById('ofc');if(!c)return'';c.width=w;c.height=h;drawF(c.getContext('2d'),id,w,h);IC[k]=c.toDataURL('image/jpeg',0.85);}
  return `<img src="${IC[k]}" style="width:100%;height:100%;object-fit:cover;${s}">`;
}
function rnd(a,b){return a+Math.random()*(b-a);}
function vig(ctx,w,h){const g=ctx.createRadialGradient(w/2,h/2,h*.12,w/2,h/2,h*.9);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.65)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);}
function wood(ctx,w,h){const bg=ctx.createLinearGradient(0,0,w,h);bg.addColorStop(0,'#4a2e12');bg.addColorStop(1,'#1e1008');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);for(let i=0;i<14;i++){ctx.beginPath();ctx.moveTo(0,rnd(0,h));ctx.bezierCurveTo(w*.3,rnd(-8,8)+i*h/14,w*.7,rnd(-6,6)+i*h/14,w,rnd(-4,4)+i*h/14);ctx.strokeStyle=`rgba(0,0,0,${rnd(.06,.18)})`;ctx.lineWidth=rnd(.5,2);ctx.stroke();}}
function plate(ctx,cx,cy,rx,ry){const pg=ctx.createRadialGradient(cx-rx*.2,cy-ry*.25,0,cx,cy,rx*1.05);pg.addColorStop(0,'#f8f4ee');pg.addColorStop(.6,'#ede8e0');pg.addColorStop(1,'#c8c0b0');ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.stroke();}
function drawF(ctx,id,w,h){
  wood(ctx,w,h);
  ctx.save();ctx.globalAlpha=0.22;const g2=ctx.createLinearGradient(w*.8,0,w*.3,h);g2.addColorStop(0,'rgba(255,240,180,.7)');g2.addColorStop(.5,'rgba(255,230,150,.2)');g2.addColorStop(1,'rgba(255,220,120,0)');ctx.fillStyle=g2;ctx.beginPath();ctx.moveTo(w*.7,-5);ctx.lineTo(w*1.2,-5);ctx.lineTo(w*.4,h+5);ctx.lineTo(0,h+5);ctx.fill();ctx.restore();
  plate(ctx,w/2,h*.54,w*.4,h*.3);
  const sg=ctx.createRadialGradient(w/2,h*.58,0,w/2,h*.56,w*.3);sg.addColorStop(0,'rgba(200,180,100,.45)');sg.addColorStop(1,'rgba(200,180,100,0)');ctx.beginPath();ctx.ellipse(w/2,h*.56,w*.3,h*.18,0,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
  ctx.font=`${h*.32}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(FEMS[id]||'🍽',w/2,h*.46);
  for(let i=0;i<10;i++){ctx.beginPath();ctx.arc(w/2+rnd(-w*.22,w*.22),h*.5+rnd(-h*.15,h*.15),rnd(1.5,3),0,Math.PI*2);ctx.fillStyle=`rgba(60,140,40,${rnd(.4,.8)})`;ctx.fill();}
  vig(ctx,w,h);
}

function showCat(cat,sub){
  S.cat=cat;S.sub=sub||null;
  const ci=CATS.find(c=>c.name===cat);
  const hasSub=['עיקריות','קינוחים'].includes(cat);
  const subList=[...new Set(gR().filter(r=>r.cat===cat&&r.sub).map(r=>r.sub))];
  const recs=appR().filter(r=>r.cat===cat&&(sub?r.sub===sub:true));
  nav('ראשי',"gTab('home')",cat);
  rnd2(`<div style="background:${ci.bg};padding:14px 16px;display:flex;align-items:center;gap:12px"><span style="font-size:32px">${ci.em}</span><div><div style="font-size:17px;font-weight:700;color:${ci.ft}">${cat}</div><div style="font-size:11px;color:${ci.ft};opacity:.8">${recs.length} מתכונים</div></div></div>

function rCard(r){
  const nm=r.chefName||(CH[r.chef]?.n||'שף אנונימי');
  const ms=r.michelin>0?'★'.repeat(r.michelin)+' ':'';
  const ex=calcEx(r.ings.reduce((s,g)=>s+g.c,0),r.ings.reduce((s,g)=>s+g.p,0),r.ings.reduce((s,g)=>s+g.f,0));
  return`<div onclick="showRecipe('${r.id}')" style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid #F0EEE6;background:#fff;cursor:pointer">
    <div style="width:66px;height:66px;border-radius:10px;flex-shrink:0;overflow:hidden">${gi(r.id,132,132)}</div>
    <div style="flex:1;min-width:0">

      <div style="font-size:11px;color:#666;margin-bottom:4px">${ms?`<span style="color:#BA7517">${ms}</span>`:''}${nm} · ${r.time} דק'</div>
      <div style="display:flex;gap:3px;flex-wrap:wrap">
        <span class="tag" style="background:${['','#EAF3DE','#FAEEDA','#FCEBEB'][r.diff]};color:${['','#27500A','#633806','#791F1F'][r.diff]}">${DL[r.diff]}</span>
        ${r.quick?`<span class="tag" style="background:#EAF3DE;color:#27500A">מהיר</span>`:''}
        ${ex.carb>0?`<span class="tag" style="background:#DBEAFE;color:#1e40af">🍞${ex.carb}</span>`:''}
        ${ex.prot>0?`<span class="tag" style="background:#DCFCE7;color:#166534">🥩${ex.prot}</span>`:''}
        ${ex.fat>0?`<span class="tag" style="background:#FEF9C3;color:#854d0e">🥑${ex.fat}</span>`:''}
      </div>
    </div>
    <div style="text-align:left;direction:ltr;flex-shrink:0"><div style="color:#BA7517;font-size:12px;font-weight:700">${'★'.repeat(Math.round(r.rating||0))}</div><div style="font-size:10px;color:#888">${r.rating||0}</div></div>
  </div>`;

async function searchInternet(q){

  if(!ak){alert('נדרש מפתח Anthropic API.\nהוסף בלשונית פרופיל → מפתח API');gTab('profile');return;}
  S.srchLoading=true;S.srchResult=null;_doSrch();

  const prompt=`חפש באינטרנט מתכון מפורסם עבור: "${q}".

העדפות לפי סדר:
1. שפי מישלן מפורסמים (רמזי, בוטורה, דוקאס, רובשון, קלר, בלומנתל)
2. שפי טלוויזיה מפורסמים (אוטולנגי, ג'יימי אוליבר, נייג'לה)
3. מתכון קלאסי מוכר אחר

חפש באינטרנט ומצא פרטים מדויקים. החזר JSON בלבד:

חשוב: המתכון חייב להיות אמיתי ומלא עם לפחות 5 שלבי הכנה ו-5 רכיבים.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ak,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const text=(data.content||[]).filter(x=>x.type==='text').map(x=>x.text).join('');
    const match=text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('לא נמצא JSON');

//  SCAN — OCR with Tesseract.js (NO API KEY)
//  + fallback manual entry
// ══════════════════════════════════════════
let _tessLib=null;
function loadTess(cb){
  if(_tessLib){cb(_tessLib);return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js';
  s.onload=()=>{_tessLib=window.Tesseract;cb(_tessLib);};
  s.onerror=()=>cb(null);
  document.head.appendChild(s);
}

function preprocessImg(dataUrl,cb){
  const img=new Image();
  img.onload=()=>{
    const scale=Math.min(1800/img.width,1800/img.height,4);
    const c=document.createElement('canvas');
    c.width=img.width*scale;c.height=img.height*scale;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,c.width,c.height);
    // greyscale + contrast
    const id=ctx.getImageData(0,0,c.width,c.height);const d=id.data;
    for(let i=0;i<d.length;i+=4){
      const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      const v=g<128?Math.max(0,g-50):Math.min(255,g+50);
      d[i]=d[i+1]=d[i+2]=v;
    }
    ctx.putImageData(id,0,0);
    cb(c.toDataURL('image/png'));
  };
  img.src=dataUrl;
}

function parseNutrition(text){
  const t=text.replace(/,/g,'.').toLowerCase();
  const res={name:'',carbs:null,protein:null,fat:null,calories:null};
  // calories
  const cm=t.match(/(?:קלוריות|calories?|kcal|קק"ל|אנרגיה|energy)[^\d]*(\d+\.?\d*)/i);
  if(cm)res.calories=parseFloat(cm[1]);
  // carbs
  const cbm=t.match(/(?:פחמימות?|carbohydrat|סה"כ פחמ|total carb)[^\d]*(\d+\.?\d*)/i);
  if(cbm)res.carbs=parseFloat(cbm[1]);
  // protein
  const pm=t.match(/(?:חלבון|protein)[^\d]*(\d+\.?\d*)/i);
  if(pm)res.protein=parseFloat(pm[1]);
  // fat
  const fm=t.match(/(?:שומן(?!\s*רווי)|fat|סה"כ שומן)[^\d]*(\d+\.?\d*)/i);
  if(fm)res.fat=parseFloat(fm[1]);
  // product name: first non-numeric meaningful line
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>3&&!/^\d/.test(l)&&!/[\|\\\/]/.test(l));
  if(lines.length>0)res.name=lines[0].substring(0,50);
  return res;
}

function updOcrProgress(pct,msg){
  const el=document.getElementById('ocr-prog');
  if(!el)return;
  el.innerHTML=`<div class="ocr-bar">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:13px;font-weight:700;color:#1e40af">🔍 מנתח תמונה (OCR)</span>

    </div>
    <div style="background:#DBEAFE;border-radius:6px;height:8px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:#1e40af;border-radius:6px;transition:width .3s"></div>
    </div>
    <div style="font-size:11px;color:#555;margin-top:5px">${msg}</div>
    <div style="font-size:10px;color:#888;margin-top:3px">ניתוח מקומי — ללא שרת, ללא מפתח API</div>
  </div>`;

async function handleCam(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    S.scan.img=e.target.result;S.scan.analyzing=true;S.scan.err='';S.scan.result=null;S.scan.ocrRunning=true;
    pgScan();
    preprocessImg(e.target.result,async(processed)=>{
      loadTess(async(Tess)=>{
        if(!Tess){
          S.scan.analyzing=false;S.scan.ocrRunning=false;
          S.scan.err='לא הצלחתי לטעון את מנוע OCR. נסה חיבור אינטרנט טוב יותר.';
          pgScan();return;
        }
        try{
          updOcrProgress(5,'טוען מנוע...');
          const worker=await Tess.createWorker(['heb','eng'],1,{
            logger:m=>{
              if(m.status==='recognizing text') updOcrProgress(15+m.progress*80,'מזהה טקסט...');
              else if(m.status==='loading language traineddata') updOcrProgress(8,'טוען שפה...');
              else if(m.status==='initializing api') updOcrProgress(10,'מאתחל...');
            }
          });
          updOcrProgress(96,'מעבד תוצאות...');
          const {data:{text}}=await worker.recognize(processed);
          await worker.terminate();
          updOcrProgress(100,'✅ הושלם!');

          const parsed=parseNutrition(text);
          if(parsed.name)S.scan.name=parsed.name;
          if(parsed.carbs!==null)S.scan.carbs=parsed.carbs;
          if(parsed.protein!==null)S.scan.prot=parsed.protein;
          if(parsed.fat!==null)S.scan.fat=parsed.fat;

          const hasData=parsed.carbs!==null||parsed.protein!==null||parsed.fat!==null;
          if(!hasData){
            S.scan.err='לא הצלחתי לזהות ערכים תזונתיים. נסה לצלם מקרוב יותר ובאור טוב. הכנס ידנית.';
          }
          S.scan.analyzing=false;S.scan.ocrRunning=false;
          if(hasData)doScanCalc();
          else pgScan();
        }catch(err){
          S.scan.analyzing=false;S.scan.ocrRunning=false;
          S.scan.err='שגיאה בניתוח: '+err.message;
          pgScan();
        }
      });
    });
  };
  reader.readAsDataURL(file);
}

        <div><label class="fl">🥩 חלבון/100</label><input class="fi" type="number" inputmode="decimal" placeholder="4" value="${sc.prot}" oninput="S.scan.prot=this.value;S.scan.result=null"></div>
        <div><label class="fl">🥑 שומן/100</label><input class="fi" type="number" inputmode="decimal" placeholder="3" value="${sc.fat}" oninput="S.scan.fat=this.value;S.scan.result=null"></div>
      </div>
      <div style="margin-bottom:14px"><label class="fl">כמות שאכלת (גרם)</label><input class="fi" type="number" inputmode="numeric" placeholder="100" value="${sc.grams}" oninput="S.scan.grams=this.value;S.scan.result=null"></div>
      <button onclick="doScanCalc()" class="btn">חשב מנות חלפין</button>
    </div>

    <!-- Results -->
    ${r?`<div class="card" style="margin-top:12px;border:2px solid #085041">
      <div style="font-size:15px;font-weight:700;margin-bottom:1px">${sc.name||'תוצאה'}</div>

        <div style="background:#DCFCE7;border-radius:10px;padding:12px;text-align:center"><div style="font-size:26px;font-weight:700;color:#166534">${r.ex.prot}</div><div style="font-size:11px;font-weight:700;color:#166534;margin-top:2px">🥩 חלבון</div><div style="font-size:10px;color:#22c55e;margin-top:1px">${r.tP}ג'</div></div>
        <div style="background:#FEF9C3;border-radius:10px;padding:12px;text-align:center"><div style="font-size:26px;font-weight:700;color:#854d0e">${r.ex.fat}</div><div style="font-size:11px;font-weight:700;color:#854d0e;margin-top:2px">🥑 שומן</div><div style="font-size:10px;color:#ca8a04;margin-top:1px">${r.tF}ג'</div></div>
      </div>
      <div style="background:#F8F7F2;border-radius:8px;padding:11px">
        <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:8px">כמה גרם = מנה אחת?</div>
        ${r.portionC?`<div style="display:flex;gap:8px;margin-bottom:6px"><span style="font-size:14px">🍞</span><span style="font-size:13px;color:#444">מנת פחמימה = <strong>${r.portionC} גרם</strong></span></div>`:''}
        ${r.portionP?`<div style="display:flex;gap:8px;margin-bottom:6px"><span style="font-size:14px">🥩</span><span style="font-size:13px;color:#444">מנת חלבון = <strong>${r.portionP} גרם</strong></span></div>`:''}
        ${r.portionF?`<div style="display:flex;gap:8px"><span style="font-size:14px">🥑</span><span style="font-size:13px;color:#444">מנת שומן = <strong>${r.portionF} גרם</strong></span></div>`:''}
        <div style="font-size:10px;color:#AAA;margin-top:8px;padding-top:6px;border-top:1px solid #E0DED6">נוסחא: 1500÷%פחמימות · 700÷%חלבון · 500÷%שומן</div>
      </div>
    </div>`:''}
  </div>`);
}
function ldDemo(i){const d=DPS[i];S.scan={...S.scan,name:d.name,carbs:d.c,prot:d.p,fat:d.f,demoIdx:i,result:null,img:null,err:'',ocrRunning:false};pgScan();}
function doScanCalc(){
  const sc=S.scan;const c=parseFloat(sc.carbs)||0,p=parseFloat(sc.prot)||0,f=parseFloat(sc.fat)||0,g=parseFloat(sc.grams)||100;
  const fc=g/100;const tC=Math.round(c*fc*10)/10,tP=Math.round(p*fc*10)/10,tF=Math.round(f*fc*10)/10;
  S.scan.result={g,tC,tP,tF,tCal:Math.round(tC*4+tP*4+tF*9),ex:calcEx(tC,tP,tF),portionC:c>0?Math.round(1500/c):null,portionP:p>0?Math.round(700/p):null,portionF:f>0?Math.round(500/f):null};
  pgScan();
}

function pgAdd(){
  if(!CU){nav(null,null,'הוסף מתכון');rnd2(`<div style="padding:40px;text-align:center"><div style="font-size:36px;margin-bottom:12px">🔐</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">יש להתחבר</div><button class="btn" style="max-width:200px;margin:0 auto;display:block" onclick="gTab('profile')">כניסה</button></div>`);return;}
  const f=S.sf;const CL=['ראשונות','סלטים','מרקים','עיקריות','קינוחים','מהירי הכנה'];const SM={'עיקריות':['עוף','בשר','דגים','פרווה'],'קינוחים':['חלבי','פרווה']};const ns=SM[f.cat];
  nav(null,null,'הוספת מתכון');
  if(S.sfOk){rnd2(`<div style="padding:52px 16px;text-align:center"><div style="font-size:52px;margin-bottom:14px">🎉</div><div style="font-size:18px;font-weight:700;margin-bottom:6px">המתכון הוגש לאישור!</div><div style="font-size:13px;color:#666;margin-bottom:24px">המנהל יאשר בקרוב</div><button class="btn" onclick="S.sfOk=false;S.sf={title:'',chefName:CU?.name||'',cat:'ראשונות',sub:'',diff:1,time:30,steps:[''],ings:[{n:'',q:'',g:'',cal:''}]};pgAdd()">הוסף עוד</button><button onclick="gTab('home')" style="margin-top:10px;width:100%;padding:13px;background:transparent;color:#1A1A18;border:2px solid #C8C6BE;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">בית</button></div>`);return;}
  rnd2(`<div style="padding:12px 14px 20px">
    <div style="margin-bottom:10px"><label class="fl">שם המתכון *</label><input class="fi" placeholder="למשל: קרם ברולה" value="${f.title}" oninput="S.sf.title=this.value"></div>

      <div><label class="fl">שף / מגיש</label><input class="fi" placeholder="שמך" value="${f.chefName}" oninput="S.sf.chefName=this.value"></div>
      <div><label class="fl">קטגוריה *</label><select class="fi" onchange="S.sf.cat=this.value;S.sf.sub='';pgAdd()">${CL.map(c=>`<option${c===f.cat?' selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    ${ns?`<div style="margin-bottom:10px"><label class="fl">תת-קטגוריה</label><select class="fi" onchange="S.sf.sub=this.value"><option value="">בחר...</option>${ns.map(s=>`<option${s===f.sub?' selected':''}>${s}</option>`).join('')}</select></div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div><label class="fl">קושי</label><select class="fi" onchange="S.sf.diff=+this.value">${[1,2,3].map(d=>`<option value="${d}"${f.diff===d?' selected':''}>${DL[d]}</option>`).join('')}</select></div>
      <div><label class="fl">זמן (דק')</label><input class="fi" type="number" inputmode="numeric" min="5" value="${f.time}" oninput="S.sf.time=+this.value"></div>
    </div>
    <div style="margin-bottom:10px"><label class="fl">תיאור</label><input class="fi" placeholder="כמה מילים..." value="${f.desc||''}" oninput="S.sf.desc=this.value"></div>
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><label class="fl" style="margin:0">👨‍🍳 שלבי הכנה</label><button onclick="S.sf.steps.push('');pgAdd()" style="padding:5px 12px;background:#085041;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ שלב</button></div>
      <div style="background:#fff;border-radius:8px;border:1.5px solid #E0DED6;padding:10px">
        ${f.steps.map((st,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start"><div class="sn">${i+1}</div><input class="fi" placeholder="תאר את השלב..." value="${st}" oninput="S.sf.steps[${i}]=this.value" style="padding:8px 10px;font-size:13px">${i>0?`<button onclick="S.sf.steps.splice(${i},1);pgAdd()" style="background:none;border:none;cursor:pointer;color:#AAA;font-size:20px;font-weight:700;padding-top:4px">×</button>`:'<span style="width:22px"></span>'}</div>`).join('')}
      </div>
    </div>
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><label class="fl" style="margin:0">🧂 רכיבים * (לפחות 2)</label><button onclick="S.sf.ings.push({n:'',q:'',g:'',cal:''});pgAdd()" style="padding:5px 12px;background:#3C3489;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ רכיב</button></div>
      <div style="background:#fff;border-radius:8px;border:1.5px solid #E0DED6;padding:10px">
        <div style="display:grid;grid-template-columns:1fr 70px 55px 50px 22px;gap:4px;margin-bottom:6px">${['שם','כמות','גרם',"קל'",''].map(h=>`<span style="font-size:11px;color:#888;font-weight:700">${h}</span>`).join('')}</div>
        ${f.ings.map((g,i)=>`<div style="display:grid;grid-template-columns:1fr 70px 55px 50px 22px;gap:4px;margin-bottom:6px;align-items:center"><input class="fi" placeholder="שם" value="${g.n}" oninput="S.sf.ings[${i}].n=this.value" style="padding:7px 8px;font-size:12px"><input class="fi" placeholder="1 כוס" value="${g.q}" oninput="S.sf.ings[${i}].q=this.value" style="padding:7px 8px;font-size:12px"><input class="fi" placeholder="240" value="${g.g}" oninput="S.sf.ings[${i}].g=this.value" style="padding:7px 8px;font-size:12px"><input class="fi" type="number" inputmode="numeric" placeholder="0" value="${g.cal}" oninput="S.sf.ings[${i}].cal=+this.value" style="padding:7px 8px;font-size:12px">${i>0?`<button onclick="S.sf.ings.splice(${i},1);pgAdd()" style="background:none;border:none;cursor:pointer;color:#AAA;font-size:20px;font-weight:700;line-height:1">×</button>`:'<span></span>'}</div>`).join('')}
      </div>
    </div>
    ${S.sfE?`<div style="background:#FCEBEB;color:#791F1F;font-size:13px;font-weight:700;padding:10px;border-radius:8px;margin-bottom:10px">${S.sfE}</div>`:''}
    <button onclick="doSub()" class="btn">הגש מתכון לאישור</button>
  </div>`);
}
function doSub(){
  const f=S.sf;S.sfE='';
  if(!f.title.trim()){S.sfE='נא להזין שם מתכון';pgAdd();return;}
  const fi=f.ings.filter(g=>g.n.trim());
  if(fi.length<2){S.sfE='נא להוסיף לפחות 2 רכיבים';pgAdd();return;}
  if(gR().find(r=>r.title.trim().toLowerCase()===f.title.trim().toLowerCase())){S.sfE=`"${f.title.trim()}" כבר קיים`;pgAdd();return;}
  const recs=gR();
  recs.push({id:'r'+Date.now(),title:f.title.trim(),chefName:f.chefName||CU.name,chef:null,michelin:0,desc:f.desc||'מתכון קהילתי.',cat:f.cat,sub:f.sub||null,diff:f.diff,time:f.time,quick:f.time<=25,rating:0,ratings:{},rc:0,approved:false,userR:true,submittedBy:CU.id,steps:f.steps.filter(s=>s.trim()),ings:fi.map(g=>({n:g.n,q:g.q,g:g.g||'',cal:+g.cal||0,p:0,c:0,f:0,fb:0}))});
  sR(recs);S.sfOk=true;pgAdd();
}
