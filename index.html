<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);--safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px)}
html,body{height:100%;overflow:hidden;background:#F7F6F2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#root{height:100%;display:flex;flex-direction:column;direction:rtl;color:#1A1A18;padding-top:var(--safe-top)}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#F7F6F2;padding-bottom:calc(56px + var(--safe-bot))}
/* top nav */
.topnav{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid #E0DED6;display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:52px;flex-shrink:0}
.logo{font-size:20px;font-weight:700;color:#1A1A18;letter-spacing:-.5px}.logo span{color:#BA7517}
.backbtn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#1A1A18;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;min-width:70px}
/* bottom tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#fff;border-top:1px solid #E0DED6;display:flex;padding-bottom:var(--safe-bot);flex-shrink:0}
.tabitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;cursor:pointer;gap:3px;border:none;background:transparent}
.tabitem svg{width:22px;height:22px}
.tabitem span{font-size:10px;font-weight:600}
.tabitem.active{color:#1A1A18}.tabitem:not(.active){color:#AAA}
/* cards / common */
.card{background:#fff;border:1px solid #E0DED6;border-radius:12px;padding:14px}
.tag{display:inline-block;padding:3px 9px;border-radius:9px;font-size:11px;font-weight:700}
.fi{width:100%;padding:10px 12px;border:1.5px solid #C8C6BE;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:#1A1A18;direction:rtl;-webkit-appearance:none}
.fi:focus{outline:none;border-color:#1A1A18}
.fl{font-size:12px;color:#555;font-weight:700;display:block;margin-bottom:5px}
.btn-blk{width:100%;padding:13px;background:#1A1A18;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.step-n{width:26px;height:26px;border-radius:50%;background:#1A1A18;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* install banner */
#install-banner{display:none;position:fixed;bottom:calc(56px + var(--safe-bot) + 10px);left:12px;right:12px;z-index:30;background:#1A1A18;color:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.canvas-img{display:block;width:100%;height:100%;object-fit:cover}
</style>
</head>

const iget=(ing,k,i,alts)=>{const use=ing.aN&&alts[i];const m={cal:'cal',p:'p',c:'c',f:'f',fb:'fb'};const a={cal:'aC',p:'aP',c:'aC2',f:'aF',fb:'aFb'};return use?(ing[a[k]]??ing[m[k]]):ing[m[k]];};

const IMG_CACHE={};
function getFoodImg(id,w,h){
  const k=`${id}_${w}_${h}`;
  if(IMG_CACHE[k])return IMG_CACHE[k];
  const c=document.getElementById('offscreen');
  if(!c)return'';
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  drawFood(ctx,id,w,h);
  IMG_CACHE[k]=c.toDataURL('image/jpeg',0.88);
  return IMG_CACHE[k];
}
function rnd(a,b){return a+Math.random()*(b-a);}
function vig(ctx,w,h,s=0.7){const g=ctx.createRadialGradient(w/2,h/2,h*.15,w/2,h/2,h*.9);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${s})`);ctx.fillStyle=g;ctx.fillRect(0,0,w,h);}
function woodBg(ctx,w,h){const bg=ctx.createLinearGradient(0,0,w,h);bg.addColorStop(0,'#4a2e12');bg.addColorStop(1,'#1e1008');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);for(let i=0;i<14;i++){ctx.beginPath();ctx.moveTo(0,rnd(-h*.1,h*1.1));ctx.bezierCurveTo(w*.3,rnd(-8,8)+i*h/14,w*.7,rnd(-6,6)+i*h/14,w,rnd(-4,4)+i*h/14);ctx.strokeStyle=`rgba(0,0,0,${rnd(.06,.18)})`;ctx.lineWidth=rnd(.5,2);ctx.stroke();}}
function platePorcelain(ctx,cx,cy,rx,ry){const s=ctx.createRadialGradient(cx,cy+ry*.2,0,cx,cy,rx*1.1);s.addColorStop(0,'rgba(0,0,0,.4)');s.addColorStop(1,'rgba(0,0,0,0)');ctx.save();ctx.scale(1,.3);ctx.beginPath();ctx.arc(cx,(cy+ry*.2)*3.33,rx*1.1,0,Math.PI*2);ctx.fillStyle=s;ctx.fill();ctx.restore();const pg=ctx.createRadialGradient(cx-rx*.2,cy-ry*.25,0,cx,cy,rx*1.05);pg.addColorStop(0,'#f8f4ee');pg.addColorStop(.6,'#ede8e0');pg.addColorStop(1,'#c8c0b0');ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.stroke();}
function drawFood(ctx,id,w,h){
  const cx=w/2,cy=h/2;
  const COLORS=['#3C3489','#27500A','#0C447C','#633806','#72243E','#085041'];
  const bg=ctx.createLinearGradient(0,0,w,h);const bc=COLORS[(parseInt(id.replace('r',''))-1)%COLORS.length];
  bg.addColorStop(0,bc);bg.addColorStop(1,'#080608');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  const EMOJIS={r1:'🍲',r2:'🥗',r3:'🍞',r4:'🥩',r5:'🍗',r6:'🐟',r7:'🍄',r8:'☕',r9:'🍫',r10:'🍳'};
  const em=EMOJIS[id]||'🍽';
  woodBg(ctx,w,h);
  platePorcelain(ctx,cx,cy,w*.38,h*.3);
  ctx.font=`${h*.28}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(em,cx,cy-h*.02);
  // subtle sauce pool
  const sg=ctx.createRadialGradient(cx,cy+h*.06,0,cx,cy+h*.04,w*.3);
  sg.addColorStop(0,'rgba(200,180,100,.35)');sg.addColorStop(1,'rgba(200,180,100,0)');
  ctx.beginPath();ctx.ellipse(cx,cy+h*.05,w*.28,h*.16,0,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
  // herb dots
  for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(cx+rnd(-w*.22,w*.22),cy+rnd(-h*.14,h*.14),rnd(1.5,3),0,Math.PI*2);ctx.fillStyle=`rgba(60,140,40,${rnd(.5,.8)})`;ctx.fill();}
  vig(ctx,w,h,.72);
}

function rateRecipe(id,stars){
  if(!CU){alert('יש להתחבר כדי לדרג');return;}
  const recs=getRecipes();
  const r=recs.find(x=>x.id===id);if(!r)return;
  if(!r.ratings)r.ratings={};
  r.ratings[CU.id]=stars;
  const vals=Object.values(r.ratings);
  r.rating=Math.round(vals.reduce((s,v)=>s+v,0)/vals.length*10)/10;
  r.rc=vals.length;
  saveRecipes(recs);
  S.stars=stars;_renderRecipe();
}

function loadDemoProd(i){const d=DEMO_PRODS[i];S.scan={...S.scan,name:d.name,carbs:d.carbs100,prot:d.prot100,fat:d.fat100,demoIdx:i,result:null,img:null,err:''};showScan();}
function doScanCalc(){
  const sc=S.scan;const c=parseFloat(sc.carbs)||0,p=parseFloat(sc.prot)||0,f=parseFloat(sc.fat)||0,g=parseFloat(sc.grams)||100;
  const fc=g/100;const tC=Math.round(c*fc*10)/10,tP=Math.round(p*fc*10)/10,tF=Math.round(f*fc*10)/10;
  S.scan.result={g,tC,tP,tF,tCal:Math.round(tC*4+tP*4+tF*9),ex:calcEx(tC,tP,tF),portionC:c>0?Math.round(1500/c):null,portionP:p>0?Math.round(700/p):null,portionF:f>0?Math.round(500/f):null};
  showScan();
}
async function handleCam(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    S.scan.img=e.target.result;S.scan.analyzing=true;S.scan.err='';S.scan.result=null;showScan();
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,
          messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:e.target.result.split(',')[1]}},
          {type:'text',text:'חלץ ערכים תזונתיים ל-100 גרם. JSON בלבד: {"name":"...","carbs":0,"protein":0,"fat":0}'}]}]})});
      const data=await res.json();
      const parsed=JSON.parse(data.content?.map(x=>x.text||'').join('').replace(/```json|```/g,'').trim());
      S.scan.name=parsed.name||'מוצר מצולם';S.scan.carbs=parsed.carbs||'';S.scan.prot=parsed.protein||'';S.scan.fat=parsed.fat||'';
      S.scan.analyzing=false;doScanCalc();
    }catch(e){S.scan.analyzing=false;S.scan.err='לא הצלחתי לקרוא. נסה שוב בצילום מוארת, או הכנס ידנית.';showScan();}
  };reader.readAsDataURL(file);
}

function showAdd(){
  if(!CU){navTop(null,null,'הוסף מתכון');render(`<div style="padding:40px;text-align:center"><div style="font-size:36px;margin-bottom:12px">🔐</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">יש להתחבר</div><div style="font-size:13px;color:#666;margin-bottom:20px">כדי להוסיף מתכון, יש להתחבר תחילה</div><button class="btn-blk" style="max-width:200px;margin:0 auto;display:block" onclick="tabGo('profile')">כניסה / הרשמה</button></div>`);return;}
  const f=S.sf;
  const CL=['ראשונות','סלטים','מרקים','עיקריות','קינוחים','מהירי הכנה'];
  const SM={'עיקריות':['עוף','בשר','דגים','פרווה'],'קינוחים':['חלבי','פרווה']};const ns=SM[f.cat];
  navTop(null,null,'הוספת מתכון');
  if(S.sfOk){render(`<div style="padding:52px 16px;text-align:center"><div style="font-size:52px;margin-bottom:14px">🎉</div><div style="font-size:18px;font-weight:700;margin-bottom:6px">המתכון הוגש!</div><div style="font-size:13px;color:#666;margin-bottom:24px">מנהל המערכת יאשר אותו בקרוב</div><button class="btn-blk" onclick="S.sfOk=false;S.sf={title:'',chefName:CU?.name||'',cat:'ראשונות',sub:'',diff:1,time:30,steps:[''],ings:[{n:'',q:'',g:'',cal:''}]};showAdd()">הוסף מתכון נוסף</button><button onclick="tabGo('home')" style="margin-top:10px;width:100%;padding:13px;background:transparent;color:#1A1A18;border:2px solid #C8C6BE;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">חזרה לדף הבית</button></div>`);return;}
  render(`
    <div style="padding:12px 14px 20px">
      <div style="margin-bottom:10px"><label class="fl">שם המתכון *</label><input class="fi" placeholder="למשל: קרם ברולה" value="${f.title}" oninput="S.sf.title=this.value"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div><label class="fl">שף / מגיש</label><input class="fi" placeholder="שמך" value="${f.chefName}" oninput="S.sf.chefName=this.value"></div>
        <div><label class="fl">קטגוריה *</label><select class="fi" onchange="S.sf.cat=this.value;S.sf.sub='';showAdd()">${CL.map(c=>`<option${c===f.cat?' selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      ${ns?`<div style="margin-bottom:10px"><label class="fl">תת-קטגוריה</label><select class="fi" onchange="S.sf.sub=this.value"><option value="">בחר...</option>${ns.map(s=>`<option${s===f.sub?' selected':''}>${s}</option>`).join('')}</select></div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div><label class="fl">קושי</label><select class="fi" onchange="S.sf.diff=+this.value">${[1,2,3].map(d=>`<option value="${d}"${f.diff===d?' selected':''}>${DL[d]}</option>`).join('')}</select></div>
        <div><label class="fl">זמן (דק')</label><input class="fi" type="number" inputmode="numeric" min="5" value="${f.time}" oninput="S.sf.time=+this.value"></div>
      </div>
      <div style="margin-bottom:10px"><label class="fl">תיאור קצר</label><input class="fi" placeholder="כמה מילים..." value="${f.desc||''}" oninput="S.sf.desc=this.value"></div>
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label class="fl" style="margin:0">👨‍🍳 שלבי הכנה</label>
          <button onclick="S.sf.steps.push('');showAdd()" style="padding:5px 12px;background:#085041;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ שלב</button>
        </div>
        <div style="background:#fff;border-radius:8px;border:1.5px solid #E0DED6;padding:10px">
          ${f.steps.map((st,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">
            <div class="step-n">${i+1}</div>
            <input class="fi" placeholder="תאר את השלב..." value="${st}" oninput="S.sf.steps[${i}]=this.value" style="padding:8px 10px;font-size:13px">
            ${i>0?`<button onclick="S.sf.steps.splice(${i},1);showAdd()" style="background:none;border:none;cursor:pointer;color:#AAA;font-size:20px;font-weight:700;padding-top:4px">×</button>`:'<span style="width:22px"></span>'}
          </div>`).join('')}
        </div>
      </div>
      <div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label class="fl" style="margin:0">🧂 רכיבים * (לפחות 2)</label>
          <button onclick="S.sf.ings.push({n:'',q:'',g:'',cal:''});showAdd()" style="padding:5px 12px;background:#3C3489;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ רכיב</button>
        </div>
        <div style="background:#fff;border-radius:8px;border:1.5px solid #E0DED6;padding:10px">
          <div style="display:grid;grid-template-columns:1fr 70px 55px 50px 22px;gap:4px;margin-bottom:6px">
            ${['שם','כמות','גרם',"קל'",''].map(h=>`<span style="font-size:11px;color:#888;font-weight:700">${h}</span>`).join('')}
          </div>
          ${f.ings.map((g,i)=>`<div style="display:grid;grid-template-columns:1fr 70px 55px 50px 22px;gap:4px;margin-bottom:6px;align-items:center">
            <input class="fi" placeholder="שם" value="${g.n}" oninput="S.sf.ings[${i}].n=this.value" style="padding:7px 8px;font-size:12px">
            <input class="fi" placeholder="1 כוס" value="${g.q}" oninput="S.sf.ings[${i}].q=this.value" style="padding:7px 8px;font-size:12px">
            <input class="fi" placeholder="240" value="${g.g}" oninput="S.sf.ings[${i}].g=this.value" style="padding:7px 8px;font-size:12px">
            <input class="fi" type="number" inputmode="numeric" placeholder="0" value="${g.cal}" oninput="S.sf.ings[${i}].cal=+this.value" style="padding:7px 8px;font-size:12px">
            ${i>0?`<button onclick="S.sf.ings.splice(${i},1);showAdd()" style="background:none;border:none;cursor:pointer;color:#AAA;font-size:20px;font-weight:700;line-height:1">×</button>`:'<span></span>'}
          </div>`).join('')}
        </div>
      </div>
      ${S.sfE?`<div style="background:#FCEBEB;color:#791F1F;font-size:13px;font-weight:700;padding:10px;border-radius:8px;margin-bottom:10px">${S.sfE}</div>`:''}
      <button onclick="doSubmit()" class="btn-blk">הגש מתכון לאישור</button>
    </div>
  `);
}
function doSubmit(){
  const f=S.sf;S.sfE='';
  if(!f.title.trim()){S.sfE='נא להזין שם מתכון';showAdd();return;}
  const fi=f.ings.filter(g=>g.n.trim());
  if(fi.length<2){S.sfE='נא להוסיף לפחות 2 רכיבים';showAdd();return;}
  const recs=getRecipes();
  if(recs.find(r=>r.title.trim().toLowerCase()===f.title.trim().toLowerCase())){S.sfE=`"${f.title.trim()}" כבר קיים`;showAdd();return;}
  const newR={
    id:'r'+Date.now(),title:f.title.trim(),chefName:f.chefName||CU.name||'שף אנונימי',chef:null,
    desc:f.desc||'מתכון קהילתי.',cat:f.cat,sub:f.sub||null,diff:f.diff,time:f.time,quick:f.time<=25,
    rating:0,ratings:{},rc:0,approved:false,userR:true,submittedBy:CU.id,submittedAt:Date.now(),
    steps:f.steps.filter(s=>s.trim()),
    ings:fi.map(g=>({n:g.n,q:g.q,g:g.g||'',cal:+g.cal||0,p:0,c:0,f:0,fb:0,aN:null}))
  };
  recs.push(newR);saveRecipes(recs);
  S.sfOk=true;showAdd();
}

// ═══════════════════════════════════════
//  PROFILE
// ═══════════════════════════════════════
function showProfile(){
  navTop(null,null,'פרופיל');
  if(!CU){render(`
    <div style="padding:40px 20px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:56px;margin-bottom:12px">👤</div>
        <div style="font-size:20px;font-weight:700">ברוך הבא לטעמים</div>
        <div style="font-size:13px;color:#666;margin-top:6px">התחבר כדי לדרג, להגיש מתכונים ולנהל</div>
      </div>
      <div class="card">
        <div style="margin-bottom:10px"><label class="fl">אימייל</label><input class="fi" id="li-email" type="email" inputmode="email" placeholder="you@example.com"></div>
        <div style="margin-bottom:14px"><label class="fl">סיסמה</label><input class="fi" id="li-pass" type="password" placeholder="••••••••"></div>
        <div id="li-err" style="color:#c0392b;font-size:12px;margin-bottom:8px;display:none"></div>
        <button onclick="doLogin()" class="btn-blk">כניסה</button>
      </div>
      <div style="margin-top:12px;text-align:center;font-size:12px;color:#888">
        <div style="margin-bottom:4px;font-weight:700">חשבונות לבדיקה:</div>
        <div>Admin: admin@taamim.co.il / admin123</div>
        <div style="margin-top:2px">משתמש: sarah@example.com / user123</div>
      </div>
    </div>
  `);return;}
  const myRecs=getRecipes().filter(r=>r.submittedBy===CU.id);
  const pendRecs=getRecipes().filter(r=>!r.approved);
  render(`
    <div style="padding:16px 14px">
      <div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div style="width:52px;height:52px;border-radius:50%;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#1e40af;flex-shrink:0">${CU.name.charAt(0)}</div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700">${CU.name}</div>
          <div style="font-size:12px;color:#666">${CU.email}</div>
          ${CU.role==='admin'?`<div style="display:inline-block;padding:2px 8px;border-radius:6px;background:#EEEDFE;color:#3C3489;font-size:11px;font-weight:700;margin-top:3px">מנהל מערכת</div>`:''}
        </div>
        <button onclick="doLogout()" style="padding:6px 12px;background:#fff;border:2px solid #C8C6BE;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:#555">יציאה</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <div style="background:#fff;border:1px solid #E0DED6;border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:28px;font-weight:700">${myRecs.length}</div>
          <div style="font-size:12px;color:#666">מתכונים שלי</div>
        </div>
        <div style="background:#fff;border:1px solid #E0DED6;border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:28px;font-weight:700">${myRecs.filter(r=>r.approved).length}</div>
          <div style="font-size:12px;color:#666">אושרו</div>
        </div>
      </div>
      ${CU.role==='admin'?adminPanel(pendRecs):''}
      ${myRecs.length>0?`<div style="font-size:14px;font-weight:700;margin-bottom:10px;margin-top:4px">המתכונים שלי</div>
      ${myRecs.map(r=>`<div style="background:#fff;border:1px solid #E0DED6;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-size:13px;font-weight:700">${r.title}</div><div style="font-size:11px;color:#888;margin-top:2px">${r.approved?'✅ מאושר':'⏳ ממתין לאישור'}</div></div>
        ${r.approved?`<button onclick="showRecipe('${r.id}')" style="padding:5px 10px;background:#1A1A18;color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">צפה</button>`:''}
      </div>`).join('')}`:''}
    </div>
  `);
}

function adminPanel(pendRecs){
  return`<div style="background:#EEEDFE;border:2px solid #7F77DD;border-radius:12px;padding:14px;margin-bottom:14px">
    <div style="font-size:15px;font-weight:700;color:#3C3489;margin-bottom:12px">🛡 פאנל ניהול</div>
    ${pendRecs.length===0?`<div style="font-size:13px;color:#666">אין מתכונים ממתינים לאישור</div>`:`
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">ממתינים לאישור (${pendRecs.length})</div>
    ${pendRecs.map(r=>`<div style="background:#fff;border-radius:10px;padding:12px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;margin-bottom:2px">${r.title}</div>
      <div style="font-size:11px;color:#666;margin-bottom:8px">מוגש על ידי: ${r.chefName} · ${r.cat}${r.sub?' / '+r.sub:''}</div>
      <div style="display:flex;gap:8px">
        <button onclick="approveRecipe('${r.id}',true)" style="flex:1;padding:8px;background:#27500A;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">✓ אישור</button>
        <button onclick="approveRecipe('${r.id}',false)" style="flex:1;padding:8px;background:#791F1F;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">✗ דחייה</button>
      </div>
    </div>`).join('')}`}
    <div style="margin-top:12px;border-top:1px solid rgba(63,52,137,.2);padding-top:12px">
      <div style="font-size:13px;font-weight:700;color:#3C3489;margin-bottom:8px">ניהול משתמשים</div>
      ${getUsers().map(u=>`<div style="background:#fff;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:13px;font-weight:700">${u.name}</div>
          <div style="font-size:11px;color:#666">${u.email} · <span style="color:${u.role==='admin'?'#3C3489':'#555'};font-weight:600">${u.role==='admin'?'מנהל':'משתמש'}</span></div>
        </div>
        ${u.id!=='admin'?`<button onclick="deleteUser('${u.id}')" style="padding:5px 10px;background:#FCEBEB;color:#791F1F;border:1px solid #F7C1C1;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">מחק</button>`:'<span style="font-size:10px;color:#888">ראשי</span>'}
      </div>`).join('')}
    </div>
  </div>`;
}

function approveRecipe(id,approve){
  const recs=getRecipes();const r=recs.find(x=>x.id===id);if(!r)return;
  if(approve){r.approved=true;saveRecipes(recs);alert(`✅ "${r.title}" אושר`);}
  else{const i=recs.indexOf(r);recs.splice(i,1);saveRecipes(recs);alert(`✗ "${r.title}" נדחה ונמחק`);}
  showProfile();
}
function deleteUser(id){
  if(!confirm('למחוק משתמש זה?'))return;
  const users=getUsers().filter(u=>u.id!==id);saveUsers(users);showProfile();
}
function doLogin(){
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  const user=getUsers().find(u=>u.email===email&&u.pass===pass);
  const errEl=document.getElementById('li-err');
  if(!user){errEl.style.display='block';errEl.textContent='אימייל או סיסמה שגויים';return;}
  CU=user;LS.set('current_user',CU);showProfile();
}
function doLogout(){CU=null;LS.set('current_user',null);showProfile();}

// ═══════════════════════════════════════
//  PWA INSTALL
// ═══════════════════════════════════════
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').style.display='block';
});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none';});}}
window.addEventListener('appinstalled',()=>{document.getElementById('install-banner').style.display='none';});

// ═══════════════════════════════════════
//  SERVICE WORKER
// ═══════════════════════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(r=>console.log('SW registered')).catch(e=>console.log('SW failed',e));});
}

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
setActive('home');
showHome();
</script>
