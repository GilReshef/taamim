<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
html,body{height:100%;overflow:hidden;background:#F7F6F2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#root{height:100%;display:flex;flex-direction:column;direction:rtl;color:#1A1A18;padding-top:var(--st)}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#F7F6F2;padding-bottom:calc(62px + var(--sb))}
.tnav{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1.5px solid #E0DED6;display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:52px;flex-shrink:0}
.logo{font-size:20px;font-weight:700;color:#1A1A18;letter-spacing:-.5px}.logo span{color:#BA7517}
.bb{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#1A1A18;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.tbar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#fff;border-top:1.5px solid #E0DED6;display:flex;padding-bottom:var(--sb)}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;cursor:pointer;gap:3px;border:none;background:transparent}
.ti svg{width:22px;height:22px}
.ti span{font-size:10px;font-weight:600}
.ti.on{color:#1A1A18}.ti:not(.on){color:#AAA}
.card{background:#fff;border:1px solid #E0DED6;border-radius:12px;padding:14px}
.tag{display:inline-block;padding:3px 9px;border-radius:9px;font-size:11px;font-weight:700}
.fi{width:100%;padding:10px 12px;border:1.5px solid #C8C6BE;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:#1A1A18;direction:rtl;-webkit-appearance:none}
.fi:focus{outline:none;border-color:#1A1A18}
.fl{font-size:12px;color:#555;font-weight:700;display:block;margin-bottom:5px}
.btn{width:100%;padding:13px;background:#1A1A18;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn:active{opacity:.85}
.sn{width:26px;height:26px;border-radius:50%;background:#1A1A18;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
</style>

//  GITHUB SYNC
//  Read: public raw.githubusercontent (no auth)
//  Write: GitHub API with Personal Access Token
// ══════════════════════════════════════════
const GH={
  owner: ()=>LS.get('gh_owner','GilReshef'),
  repo:  ()=>LS.get('gh_repo','taamim'),
  token: ()=>LS.get('gh_token',''),
  file:  'data/community_recipes.json',

  rawUrl(){
    return `https://raw.githubusercontent.com/${this.owner()}/${this.repo()}/main/${this.file}?t=${Date.now()}`;
  },
  apiUrl(){
    return `https://api.github.com/repos/${this.owner()}/${this.repo()}/contents/${this.file}`;
  },

  // Fetch community recipes from GitHub (no auth needed for public repo)
  async fetchCommunity(){
    try{
      const r=await fetch(this.rawUrl(),{cache:'no-store'});
      if(!r.ok)return [];
      const data=await r.json();
      return Array.isArray(data)?data:[];
    }catch{return [];}
  },

  // Push a recipe to GitHub (requires PAT token)
  async pushRecipe(recipe){
    const token=this.token();
    if(!token)throw new Error('אין מפתח GitHub. הגדר בפרופיל → הגדרות GitHub.');

    // First get current file SHA + content
    const headers={'Authorization':'token '+token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
    let sha=null,existing=[];
    try{
      const r=await fetch(this.apiUrl(),{headers});
      if(r.ok){
        const d=await r.json();
        sha=d.sha;
        existing=JSON.parse(atob(d.content.replace(/\n/g,'')));
      }
    }catch{}

    // Add new recipe (avoid duplicates)
    if(!existing.find(x=>x.id===recipe.id))existing.push(recipe);

    const body={
      message:`הוספת מתכון: ${recipe.title}`,
      content:btoa(unescape(encodeURIComponent(JSON.stringify(existing,null,2)))),
      ...(sha?{sha}:{})
    };
    const res=await fetch(this.apiUrl(),{method:'PUT',headers,body:JSON.stringify(body)});
    if(!res.ok){const e=await res.json();throw new Error(e.message||'GitHub error '+res.status);}
    return true;
  }
};

function allAppR(){
  const local=localAppR();
  const localIds=new Set(local.map(r=>r.id));
  const extra=_communityRecs.filter(r=>r.approved&&!localIds.has(r.id));
  return [...local,...extra];
}

// Load community recipes from GitHub on startup
async function syncFromGitHub(){
  const sync=document.getElementById('sync-status');
  if(sync)sync.textContent='🔄 מסנכרן...';
  try{
    const community=await GH.fetchCommunity();
    if(community.length>0){
      _communityRecs=community;
      LS.set('community_recs',community);
      if(sync)sync.textContent=`✅ ${community.length} מתכונים מהקהילה`;
      // Refresh home if visible
      if(S.tab==='home')pgHome();
    }else{
      if(sync)sync.textContent='';
    }
  }catch{
    if(sync)sync.textContent='';
  }
}

const isHebrew=t=>/[\u05D0-\u05EA]/.test(t);

async function myMemoryTranslate(text,from,to){
  try{const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`,{mode:'cors'});const d=await r.json();const t=d?.responseData?.translatedText||'';if(t&&t.toLowerCase()!==text.toLowerCase())return t;return text;}catch{return text;}
}
async function hebrewToEnglish(query){
  const q=query.trim().toLowerCase();
  if(HE_EN_DICT[q])return HE_EN_DICT[q];
  for(const[he,en]of Object.entries(HE_EN_DICT)){if(q.includes(he)||he.includes(q))return en;}
  if(!isHebrew(query))return query;
  return await myMemoryTranslate(query,'he','en');
}
function translateIngredient(name){const n=name.toLowerCase().trim();if(EN_HE_INGS[n])return EN_HE_INGS[n];for(const[en,he]of Object.entries(EN_HE_INGS)){if(n.includes(en))return he;}return name;}
async function translateSteps(steps){const results=[];for(const step of steps){if(!step.trim()){results.push(step);continue;}try{const t=await myMemoryTranslate(step,'en','he');results.push(t||step);}catch{results.push(step);}await new Promise(r=>setTimeout(r,80));}return results;}
async function translateTitle(text){if(!text)return text;const c=LS.get('tr_'+text,null);if(c)return c;const t=await myMemoryTranslate(text,'en','he');LS.set('tr_'+text,t);return t;}
function estimateCal(n,q){const nl=n.toLowerCase();if(/flour|sugar/.test(nl))return 70;if(/butter|oil/.test(nl))return 110;if(/chicken|beef|lamb|pork/.test(nl))return 100;if(/egg/.test(nl))return 70;if(/milk|cream/.test(nl))return 35;return 40;}
function estimateCarbs(n){const nl=n.toLowerCase();if(/flour|pasta|rice|sugar|bread/.test(nl))return 15;if(/potato/.test(nl))return 12;return 3;}
function estimateFat(n){const nl=n.toLowerCase();if(/butter|oil|cream/.test(nl))return 12;if(/cheese/.test(nl))return 8;return 2;}

async function mealToHebrew(m,statusCb){
  statusCb('מתרגם שם...');
  const title=await translateTitle(m.strMeal);
  const ings=[];
  for(let i=1;i<=20;i++){const n=(m[`strIngredient${i}`]||'').trim();const q=(m[`strMeasure${i}`]||'').trim();if(!n)break;ings.push({n:translateIngredient(n),q,g:'',cal:estimateCal(n,q),p:0,c:estimateCarbs(n),f:estimateFat(n),fb:0});}
  const rawSteps=(m.strInstructions||'').replace(/\r\n/g,'\n').split(/(?<=[.!?])\s+|\n{2,}/).map(s=>s.replace(/\n/g,' ').trim()).filter(s=>s.length>15).slice(0,8);
  statusCb('מתרגם שלבי הכנה...');
  const hebrewSteps=await translateSteps(rawSteps);
  const cat=MEAL_CAT[m.strCategory]||'עיקריות';
  const sub=MEAL_SUB[m.strCategory]||null;
  const chefName=AREA_CHEF[m.strArea]||null;
  const time=cat==='קינוחים'?60:cat==='מרקים'?45:Math.max(20,rawSteps.length*8);
  return{id:'meal_'+m.idMeal+'_'+Date.now(),title,chefName,chef:null,michelin:chefName?1:0,cat,sub,diff:cat==='קינוחים'?2:1,time,quick:time<=25,rating:4.5,rc:50,approved:true,userR:false,ratings:{},desc:`${title} — מתכון מ-TheMealDB, מתורגם לעברית.`,source:'TheMealDB',steps:hebrewSteps,ings};
}

const IC={};
function gi(id,w,h,s=''){const k=`${id}_${w}_${h}`;if(!IC[k]){const c=document.getElementById('ofc');if(!c)return'';c.width=w;c.height=h;drawF(c.getContext('2d'),id,w,h);IC[k]=c.toDataURL('image/jpeg',0.85);}return`<img src="${IC[k]}" style="width:100%;height:100%;object-fit:cover;${s}">`;}
function rnd(a,b){return a+Math.random()*(b-a);}
function vig(ctx,w,h){const g=ctx.createRadialGradient(w/2,h/2,h*.12,w/2,h/2,h*.9);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.65)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);}
function wood(ctx,w,h){const bg=ctx.createLinearGradient(0,0,w,h);bg.addColorStop(0,'#4a2e12');bg.addColorStop(1,'#1e1008');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);for(let i=0;i<14;i++){ctx.beginPath();ctx.moveTo(0,rnd(0,h));ctx.bezierCurveTo(w*.3,rnd(-8,8)+i*h/14,w*.7,rnd(-6,6)+i*h/14,w,rnd(-4,4)+i*h/14);ctx.strokeStyle=`rgba(0,0,0,${rnd(.06,.18)})`;ctx.lineWidth=rnd(.5,2);ctx.stroke();}}
function plate(ctx,cx,cy,rx,ry){const pg=ctx.createRadialGradient(cx-rx*.2,cy-ry*.25,0,cx,cy,rx*1.05);pg.addColorStop(0,'#f8f4ee');pg.addColorStop(.6,'#ede8e0');pg.addColorStop(1,'#c8c0b0');ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.stroke();}
function drawF(ctx,id,w,h){wood(ctx,w,h);ctx.save();ctx.globalAlpha=0.22;const g2=ctx.createLinearGradient(w*.8,0,w*.3,h);g2.addColorStop(0,'rgba(255,240,180,.7)');g2.addColorStop(.5,'rgba(255,230,150,.2)');g2.addColorStop(1,'rgba(255,220,120,0)');ctx.fillStyle=g2;ctx.beginPath();ctx.moveTo(w*.7,-5);ctx.lineTo(w*1.2,-5);ctx.lineTo(w*.4,h+5);ctx.lineTo(0,h+5);ctx.fill();ctx.restore();plate(ctx,w/2,h*.54,w*.4,h*.3);const sg=ctx.createRadialGradient(w/2,h*.58,0,w/2,h*.56,w*.3);sg.addColorStop(0,'rgba(200,180,100,.45)');sg.addColorStop(1,'rgba(200,180,100,0)');ctx.beginPath();ctx.ellipse(w/2,h*.56,w*.3,h*.18,0,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();ctx.font=`${h*.32}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(FEMS[id]||'🍽',w/2,h*.46);for(let i=0;i<10;i++){ctx.beginPath();ctx.arc(w/2+rnd(-w*.22,w*.22),h*.5+rnd(-h*.15,h*.15),rnd(1.5,3),0,Math.PI*2);ctx.fillStyle=`rgba(60,140,40,${rnd(.4,.8)})`;ctx.fill();}vig(ctx,w,h);}

function _rRec(){
  const r=S.previewRecipe||(S.rid?[...gR(),..._communityRecs].find(x=>x.id===S.rid):null);
  if(!r)return;
  const isPreview=!!S.previewRecipe;
  const alreadySaved=!isPreview||allAppR().find(x=>x.id===r.id||x.title.toLowerCase()===r.title.toLowerCase());
  const nm=r.chefName||(CH[r.chef]?.n||'שף אנונימי');
  const ms=r.michelin>0?'★'.repeat(r.michelin):'';
  const sv=S.sv;
  const tC=r.ings.reduce((s,g,i)=>s+iget(g,'cal',i,S.alts),0);
  const tP=r.ings.reduce((s,g,i)=>s+iget(g,'p',i,S.alts),0);
  const tCa=r.ings.reduce((s,g,i)=>s+iget(g,'c',i,S.alts),0);
  const tF=r.ings.reduce((s,g,i)=>s+iget(g,'f',i,S.alts),0);
  const tFb=r.ings.reduce((s,g,i)=>s+iget(g,'fb',i,S.alts),0);
  const bC=r.ings.reduce((s,g)=>s+g.cal,0);const saved=bC-tC;const mx=Math.max(tP,tCa,tF,tFb,1);
  const sug=r.ings.filter((g,i)=>g.aN&&!S.alts[i]);
  const SVOP=[1,2,3,4,6,8];
  const MAC=[['חלבון',tP,'#185FA5'],['פחמימות',tCa,'#854F0B'],['שומן',tF,'#72243E'],['סיבים',tFb,'#085041']];
  const ex=calcEx(tCa,tP,tF);const steps=r.steps||[];
  const curR=r.ratings&&CU?r.ratings[CU.id]||0:0;

  const backLabel=isPreview?'חיפוש':r.cat;

// Save a previewed recipe to local + GitHub
async function savePreviewRecipe(){
  const r=S.previewRecipe;if(!r)return;
  if(allAppR().find(x=>x.id===r.id||x.title.toLowerCase()===r.title.toLowerCase())){alert(`"${r.title}" כבר קיים!`);return;}
  r.approved=true;
  // Save locally
  const recs=gR();recs.push(r);sR(recs);
  // Push to GitHub
  const token=GH.token();
  if(token){
    try{
      const btn=document.querySelector('button[onclick="savePreviewRecipe()"]');
      if(btn){btn.textContent='⏳ שומר ומסנכרן ל-GitHub...';btn.disabled=true;}
      await GH.pushRecipe(r);
      alert(`✅ "${r.title}" נוסף ושועתק ל-GitHub!\nכל המשתמשים יראו אותו בפתיחה הבאה.`);
    }catch(e){
      alert(`✅ "${r.title}" נוסף מקומית.\n⚠️ סנכרון GitHub נכשל: ${e.message}`);
    }
  }else{
    alert(`✅ "${r.title}" נוסף!\n💡 הגדר GitHub Token בפרופיל כדי לשתף עם כולם.`);
  }
  S.previewRecipe=null;S.srchResult=null;pgSearch();
}

function rateR(id,stars){
  if(!CU){alert('יש להתחבר כדי לדרג');return;}
  const recs=gR();const r=recs.find(x=>x.id===id);if(!r)return;
  if(!r.ratings)r.ratings={};r.ratings[CU.id]=stars;
  const vals=Object.values(r.ratings);r.rating=Math.round(vals.reduce((s,v)=>s+v,0)/vals.length*10)/10;r.rc=vals.length;
  sR(recs);_rRec();
}

function _doSrch(){
  const q=(S.srch||'').trim();
  const loc=document.getElementById('srch-local');
  const net=document.getElementById('srch-net');
  const prev=document.getElementById('srch-preview');
  if(!loc||!net)return;
  if(q.length<2){
    loc.innerHTML=`<div style="padding:24px;text-align:center;color:#888;font-size:13px">הקלד לחיפוש (עברית או אנגלית)...</div>`;
    net.innerHTML='';if(prev)prev.innerHTML='';return;
  }
  const found=allAppR().filter(r=>{const qq=q.toLowerCase();return(r.title||'').toLowerCase().includes(qq)||(r.chefName||'').toLowerCase().includes(qq)||(r.desc||'').toLowerCase().includes(qq)||(r.cat||'').toLowerCase().includes(qq)||(r.ings||[]).some(g=>g.n.toLowerCase().includes(qq));});
  loc.innerHTML=found.length===0?`<div style="padding:14px 14px 6px;text-align:center;color:#888;font-size:13px">לא נמצאו תוצאות מקומיות עבור "${q}"</div>`:`<div style="padding:8px 14px 4px;font-size:12px;color:#888;font-weight:700">נמצאו ${found.length} באפליקציה</div>`+found.map(r=>rCard(r)).join('');
  net.innerHTML=S.srchLoading
    ?`<div style="background:#F0F9FF;border:1.5px solid #BFDBFE;border-radius:10px;padding:13px;display:flex;align-items:center;gap:10px"><div style="font-size:22px">🌐</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#1e40af">מחפש ומתרגם לעברית...</div><div id="srch-status" style="font-size:11px;color:#666;margin-top:3px">${S.srchStatus||''}</div></div></div>`
    :`<button onclick="searchInternet('${q.replace(/'/g,"\\'")}',this)" style="width:100%;padding:13px;background:#3C3489;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px"><span>🌐</span><span>${found.length===0?`חפש "${q}" באינטרנט`:`עוד מתכונים: "${q}" מהאינטרנט`}</span></button>`;
  if(prev&&S.srchResult)prev.innerHTML=renderPreview(S.srchResult);
  else if(prev)prev.innerHTML='';
}

function updStatus(msg){S.srchStatus=msg;const el=document.getElementById('srch-status');if(el)el.textContent=msg;}

async function searchInternet(q){
  S.srchLoading=true;S.srchResult=null;S.srchStatus='';_doSrch();
  try{
    updStatus('מתרגם חיפוש לאנגלית...');
    const englishQuery=await hebrewToEnglish(q);
    updStatus(`מחפש: "${englishQuery}"...`);
    const res=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(englishQuery)}`,{mode:'cors'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    let meal=null;
    if(data.meals&&data.meals.length>0)meal=data.meals.find(m=>AREA_CHEF[m.strArea])||data.meals[0];
    if(!meal){
      const words=englishQuery.split(' ');
      for(const word of words){
        if(word.length<3)continue;
        updStatus(`מנסה: "${word}"...`);
        const r2=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(word)}`,{mode:'cors'});
        const d2=await r2.json();
        if(d2.meals&&d2.meals.length>0){meal=d2.meals.find(m=>AREA_CHEF[m.strArea])||d2.meals[0];break;}
      }
    }
    if(!meal){S.srchLoading=false;_doSrch();const net=document.getElementById('srch-net');if(net)net.innerHTML+=`<div style="background:#FEF9C3;border:1px solid #BA7517;border-radius:10px;padding:12px;margin-top:8px;font-size:13px;color:#633806">לא נמצא מתכון עבור "${q}". נסה מילה אחרת, או לחץ + להוסיף ידנית.</div>`;return;}
    const recipe=await mealToHebrew(meal,updStatus);
    S.srchResult={recipe,source:'TheMealDB (תורגם לעברית)'};
    S.srchLoading=false;_doSrch();
    setTimeout(()=>{const p=document.getElementById('srch-preview');if(p)p.scrollIntoView({behavior:'smooth',block:'start'});},200);
  }catch(err){
    S.srchLoading=false;_doSrch();
    const net=document.getElementById('srch-net');if(net)net.innerHTML+=`<div style="background:#FCEBEB;color:#791F1F;font-size:12px;font-weight:700;padding:10px;border-radius:8px;margin-top:8px">שגיאה: ${err.message}</div>`;
  }
}

async function _addPreviewRecipe(){

let _tessLib=null;

function preprocessImg(dataUrl,cb){const img=new Image();img.onload=()=>{const scale=Math.min(2000/img.width,2000/img.height,4);const c=document.createElement('canvas');c.width=img.width*scale;c.height=img.height*scale;const ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);const id=ctx.getImageData(0,0,c.width,c.height);const d=id.data;for(let i=0;i<d.length;i+=4){const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];const v=g<128?Math.max(0,g-60):Math.min(255,g+60);d[i]=d[i+1]=d[i+2]=v;}ctx.putImageData(id,0,0);cb(c.toDataURL('image/png'));};img.src=dataUrl;}
function parseNutrition(text){const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>0);const result={name:'',carbs:null,protein:null,fat:null,calories:null};for(const line of lines){const l=line.toLowerCase().replace(/,/g,'.');if(result.calories===null&&/energy|calories|אנרגיה|קלוריות/i.test(l)){const nums=(l.match(/\d+\.?\d*/g)||[]).map(Number).filter(n=>n>=50&&n<=900);if(nums.length)result.calories=Math.max(...nums);}if(result.carbs===null&&/(?:total.{0,10}carb|סך.{0,8}פחמ|פחמימות.{0,4}כולל|carbohydrate)/i.test(l)&&!/sugar|סוכר|polyol|פולי|fiber|סיב|dietary/i.test(l)){const nums=(l.match(/\d+\.?\d*/g)||[]).map(Number).filter(n=>n>=0&&n<=100);if(nums.length)result.carbs=Math.max(...nums);}if(result.protein===null&&/protein|חלבון/i.test(l)){const nums=(l.match(/\d+\.?\d*/g)||[]).map(Number).filter(n=>n>=0&&n<=100);if(nums.length)result.protein=Math.max(...nums);}if(result.fat===null&&/(?:total.{0,6}fat|סך.{0,6}שומ|שומנים)/i.test(l)&&!/saturated|רווי|trans|טראנס/i.test(l)){const nums=(l.match(/\d+\.?\d*/g)||[]).map(Number).filter(n=>n>=0&&n<=100);if(nums.length)result.fat=Math.max(...nums);}}const total=(result.carbs||0)+(result.protein||0)+(result.fat||0);if(total>105){result.carbs=null;result.protein=null;result.fat=null;for(const line of lines){const l=line.toLowerCase().replace(/,/g,'.');if(result.carbs===null&&/פחמימות|carbohydrate/i.test(l)&&!/סוכר|sugar|polyol|fiber/i.test(l)){const m=l.match(/\d+\.?\d*/);if(m){const v=parseFloat(m[0]);if(v>=0&&v<=100)result.carbs=v;}}if(result.protein===null&&/חלבון|protein/i.test(l)){const m=l.match(/\d+\.?\d*/);if(m){const v=parseFloat(m[0]);if(v>=0&&v<=100)result.protein=v;}}if(result.fat===null&&/שומן|fat/i.test(l)&&!/רווי|saturated|trans/i.test(l)){const m=l.match(/\d+\.?\d*/);if(m){const v=parseFloat(m[0]);if(v>=0&&v<=100)result.fat=v;}}}}if(!result.calories&&result.carbs!==null)result.calories=Math.round((result.carbs||0)*4+(result.protein||0)*4+(result.fat||0)*9);const nameLine=lines.find(l=>l.length>3&&!/^ function updOcrProg(pct,msg){const el=document.getElementById('ocr-prog');if(!el)return;el.innerHTML=`<div style="background:#F0F9FF;border:1.5px solid #BFDBFE;border-radius:10px;padding:12px 14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;font-weight:700;color:#1e40af">🔍 מנתח תמונה (OCR)</span><span style="font-size:13px;font-weight:700;color:#1e40af">${Math.round(pct)}%</span></div><div style="background:#DBEAFE;border-radius:6px;height:8px;overflow:hidden"><div style="height:100%;width:${pct}%;background:#1e40af;border-radius:6px;transition:width .3s"></div></div><div style="font-size:11px;color:#555;margin-top:5px">${msg}</div><div style="font-size:10px;color:#888;margin-top:2px">ניתוח מקומי · ללא מפתח</div></div>`;}
async function handleCam(inp){const file=inp.files[0];if(!file)return;const reader=new FileReader();reader.onload=async(e)=>{S.scan={...S.scan,img:e.target.result,ocrRunning:true,err:'',result:null};pgScan();preprocessImg(e.target.result,async(processed)=>{loadTess(async(Tess)=>{if(!Tess){S.scan.ocrRunning=false;S.scan.err='לא הצלחתי לטעון OCR.';pgScan();return;}try{updOcrProg(5,'טוען...');const worker=await Tess.createWorker(['heb','eng'],1,{logger:m=>{if(m.status==='recognizing text')updOcrProg(15+m.progress*80,'מזהה טקסט...');else if(m.status==='loading language traineddata')updOcrProg(8,'טוען שפה...');else if(m.status==='initializing api')updOcrProg(12,'מאתחל...');}});updOcrProg(97,'מעבד...');const{data:{text}}=await worker.recognize(processed);await worker.terminate();updOcrProg(100,'✅ הושלם!');const parsed=parseNutrition(text);if(parsed.name)S.scan.name=parsed.name;if(parsed.carbs!==null)S.scan.carbs=parsed.carbs;if(parsed.protein!==null)S.scan.prot=parsed.protein;if(parsed.fat!==null)S.scan.fat=parsed.fat;const hasData=parsed.carbs!==null||parsed.protein!==null||parsed.fat!==null;S.scan.ocrRunning=false;if(hasData){S.scan.err='';doScanCalc();}else{S.scan.err='לא זוהו ערכים. נסה שוב עם תאורה טובה, או הכנס ידנית.';pgScan();}}catch(err){S.scan.ocrRunning=false;S.scan.err='שגיאה: '+err.message;pgScan();}});});};reader.readAsDataURL(file);}

    <div style="margin-bottom:10px"><label class="fl">תיאור</label><input class="fi" placeholder="כמה מילים..." value="${f.desc||''}" oninput="S.sf.desc=this.value"></div>
    <div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><label class="fl" style="margin:0">👨‍🍳 שלבי הכנה</label><button onclick="S.sf.steps.push('');pgAdd()" style="padding:5px 12px;background:#085041;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ שלב</button></div><div style="background:#fff;border-radius:8px;border:1.5px solid #E0DED6;padding:10px">${f.steps.map((st,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start"><div class="sn">${i+1}</div><input class="fi" placeholder="תאר את השלב..." value="${st}" oninput="S.sf.steps[${i}]=this.value" style="padding:8px 10px;font-size:13px">${i>0?`<button onclick="S.sf.steps.splice(${i},1);pgAdd()" style="background:none;border:none;cursor:pointer;color:#AAA;font-size:20px;font-weight:700;padding-top:4px">×</button>`:'<span style="width:22px"></span>'}</div>`).join('')}</div></div>
    <div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><label class="fl" style="margin:0">🧂 רכיבים * (לפחות 2)</label><button onclick="S.sf.ings.push({n:'',q:'',g:'',cal:''});pgAdd()" style="padding:5px 12px;background:#3C3489;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ רכיב</button></div><div style="background:#fff;border-radius:8px;border:1.5px solid #E0DED6;padding:10px"><div style="display:grid;grid-template-columns:1fr 70px 55px 50px 22px;gap:4px;margin-bottom:6px">${['שם','כמות','גרם',"קל'",''].map(h=>`<span style="font-size:11px;color:#888;font-weight:700">${h}</span>`).join('')}</div>${f.ings.map((g,i)=>`<div style="display:grid;grid-template-columns:1fr 70px 55px 50px 22px;gap:4px;margin-bottom:6px;align-items:center"><input class="fi" placeholder="שם" value="${g.n}" oninput="S.sf.ings[${i}].n=this.value" style="padding:7px 8px;font-size:12px"><input class="fi" placeholder="1 כוס" value="${g.q}" oninput="S.sf.ings[${i}].q=this.value" style="padding:7px 8px;font-size:12px"><input class="fi" placeholder="240" value="${g.g}" oninput="S.sf.ings[${i}].g=this.value" style="padding:7px 8px;font-size:12px"><input class="fi" type="number" inputmode="numeric" placeholder="0" value="${g.cal}" oninput="S.sf.ings[${i}].cal=+this.value" style="padding:7px 8px;font-size:12px">${i>0?`<button onclick="S.sf.ings.splice(${i},1);pgAdd()" style="background:none;border:none;cursor:pointer;color:#AAA;font-size:20px;font-weight:700;line-height:1">×</button>`:'<span></span>'}</div>`).join('')}</div></div>
    ${S.sfE?`<div style="background:#FCEBEB;color:#791F1F;font-size:13px;font-weight:700;padding:10px;border-radius:8px;margin-bottom:10px">${S.sfE}</div>`:''}
    <button onclick="doSub()" class="btn">הגש מתכון לאישור</button>
  </div>`);
}
function doSub(){
  const f=S.sf;S.sfE='';
  if(!f.title.trim()){S.sfE='נא להזין שם מתכון';pgAdd();return;}
  const fi=f.ings.filter(g=>g.n.trim());if(fi.length<2){S.sfE='נא להוסיף לפחות 2 רכיבים';pgAdd();return;}
  if(allAppR().find(r=>r.title.trim().toLowerCase()===f.title.trim().toLowerCase())){S.sfE=`"${f.title.trim()}" כבר קיים`;pgAdd();return;}
  const newR={id:'r'+Date.now(),title:f.title.trim(),chefName:f.chefName||CU.name,chef:null,michelin:0,desc:f.desc||'מתכון קהילתי.',cat:f.cat,sub:f.sub||null,diff:f.diff,time:f.time,quick:f.time<=25,rating:0,ratings:{},rc:0,approved:false,userR:true,submittedBy:CU.id,steps:f.steps.filter(s=>s.trim()),ings:fi.map(g=>({n:g.n,q:g.q,g:g.g||'',cal:+g.cal||0,p:0,c:0,f:0,fb:0}))};
  const recs=gR();recs.push(newR);sR(recs);S.sfOk=true;pgAdd();
}

// ══════════════════════════════════════════
//  PROFILE — includes GitHub settings
// ══════════════════════════════════════════
function pgProfile(){
  nav(null,null,'פרופיל');const ak=gAK();
  const ghToken=GH.token();const ghOwner=GH.owner();const ghRepo=GH.repo();
  if(!CU){rnd2(`<div style="padding:32px 20px">
    <div style="text-align:center;margin-bottom:24px"><div style="font-size:52px;margin-bottom:12px">👤</div><div style="font-size:20px;font-weight:700">ברוך הבא לטעמים</div></div>
    <div class="card"><div style="margin-bottom:10px"><label class="fl">אימייל</label><input class="fi" id="li-e" type="email" inputmode="email" placeholder="you@example.com"></div><div style="margin-bottom:14px"><label class="fl">סיסמה</label><input class="fi" id="li-p" type="password" placeholder="••••••••"></div><div id="li-err" style="color:#c0392b;font-size:13px;margin-bottom:8px;display:none"></div><button onclick="doLogin()" class="btn">כניסה</button></div>
    <div style="margin-top:10px;padding:12px;background:#F8F7F2;border-radius:10px;font-size:12px;color:#888;text-align:center"><div style="font-weight:700;margin-bottom:4px">לבדיקה:</div><div>Admin: admin@taamim.co.il / admin123</div><div style="margin-top:2px">משתמש: sarah@example.com / user123</div></div>
    ${ghBlock(ghOwner,ghRepo,ghToken)}
  </div>`);return;}
  const myR=gR().filter(r=>r.submittedBy===CU.id);const pend=gR().filter(r=>!r.approved);
  rnd2(`<div style="padding:16px 14px">
    <div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:14px"><div style="width:52px;height:52px;border-radius:50%;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#1e40af;flex-shrink:0">${CU.name.charAt(0)}</div><div style="flex:1"><div style="font-size:16px;font-weight:700">${CU.name}</div><div style="font-size:12px;color:#666">${CU.email}</div>${CU.role==='admin'?`<div style="display:inline-block;padding:2px 8px;border-radius:6px;background:#EEEDFE;color:#3C3489;font-size:11px;font-weight:700;margin-top:3px">מנהל מערכת</div>`:''}</div><button onclick="doLogout()" style="padding:6px 12px;background:#fff;border:2px solid #C8C6BE;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:#555">יציאה</button></div>
    ${ghBlock(ghOwner,ghRepo,ghToken)}
    ${CU.role==='admin'?admPanel(pend):''}
    ${myR.length>0?`<div style="font-size:14px;font-weight:700;margin-bottom:10px">המתכונים שלי (${myR.length})</div>${myR.map(r=>`<div style="background:#fff;border:1px solid #E0DED6;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:13px;font-weight:700">${r.title}</div><div style="font-size:11px;color:#888;margin-top:2px">${r.approved?'✅ מאושר':'⏳ ממתין'}</div></div>${r.approved?`<button onclick="showRecipe('${r.id}')" style="padding:5px 10px;background:#1A1A18;color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">צפה</button>`:''}</div>`).join('')}`:''}
  </div>`);
}

function ghBlock(owner,repo,token){
  return`<div class="card" style="margin-top:14px;border:1.5px solid ${token?'#27500A':'#3C3489'}">
    <div style="font-size:14px;font-weight:700;margin-bottom:8px">🔗 הגדרות GitHub <span style="font-size:11px;font-weight:400;color:${token?'#27500A':'#888'}">${token?'✅ מחובר':'לא מוגדר'}</span></div>
    <div style="font-size:12px;color:#555;margin-bottom:10px;line-height:1.7">
      <strong>כיצד עובד השיתוף:</strong><br>
      כל מתכון חדש נשמר ב-GitHub ומגיע לכל המשתמשים בפתיחה הבאה.<br>
      📖 קריאה: חינמית לחלוטין, ללא טוקן.<br>
      ✍️ כתיבה: נדרש Personal Access Token.
      <a href="https://github.com/settings/tokens/new?scopes=contents&description=taamim-app" target="_blank" style="color:#3C3489;font-weight:700;display:block;margin-top:4px">⬡ צור Personal Access Token (GitHub)</a>
      <span style="font-size:11px;color:#888">הרשאות נדרשות: repo → contents → write</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label class="fl">GitHub Owner</label><input class="fi" id="gh-owner" placeholder="GilReshef" value="${owner}" style="font-size:13px;padding:8px 10px"></div>
      <div><label class="fl">Repository</label><input class="fi" id="gh-repo" placeholder="taamim" value="${repo}" style="font-size:13px;padding:8px 10px"></div>
    </div>
    <input class="fi" id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value="${token}" style="margin-bottom:8px">
    <button onclick="saveGH()" class="btn" style="background:${token?'#27500A':'#3C3489'}">שמור הגדרות GitHub</button>
    ${token?`<button onclick="syncFromGitHub().then(()=>alert('✅ סונכרן!'))" style="margin-top:8px;width:100%;padding:10px;background:#fff;border:2px solid #27500A;color:#27500A;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">🔄 סנכרן עכשיו מ-GitHub</button>`:''}
  </div>`;
}
function saveGH(){
  const o=document.getElementById('gh-owner')?.value.trim();
  const r=document.getElementById('gh-repo')?.value.trim();
  const t=document.getElementById('gh-token')?.value.trim();
  if(o)LS.set('gh_owner',o);if(r)LS.set('gh_repo',r);if(t!==undefined)LS.set('gh_token',t);
  alert('✅ הגדרות GitHub נשמרו!');pgProfile();
}
function admPanel(pend){return`<div style="background:#EEEDFE;border:2px solid #7F77DD;border-radius:12px;padding:14px;margin-bottom:14px"><div style="font-size:15px;font-weight:700;color:#3C3489;margin-bottom:12px">🛡 פאנל ניהול</div>${pend.length===0?`<div style="font-size:13px;color:#666;padding:8px 0">אין ממתינים ✓</div>`:`<div style="font-size:13px;font-weight:700;margin-bottom:8px">ממתינים (${pend.length})</div>${pend.map(r=>`<div style="background:#fff;border-radius:10px;padding:12px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;margin-bottom:2px">${r.title}</div><div style="font-size:11px;color:#666;margin-bottom:8px">${r.chefName||'אנונימי'} · ${r.cat}</div><div style="display:flex;gap:8px"><button onclick="apprR('${r.id}',true)" style="flex:1;padding:8px;background:#27500A;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">✓ אשר ופרסם</button><button onclick="apprR('${r.id}',false)" style="flex:1;padding:8px;background:#791F1F;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">✗ דחה</button></div></div>`).join('')}`}<div style="margin-top:12px;border-top:1px solid rgba(63,52,137,.2);padding-top:12px"><div style="font-size:13px;font-weight:700;color:#3C3489;margin-bottom:8px">משתמשים (${gU().length})</div>${gU().map(u=>`<div style="background:#fff;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:13px;font-weight:700">${u.name}</div><div style="font-size:11px;color:#666">${u.email} · ${u.role==='admin'?'מנהל':'משתמש'}</div></div>${u.id!=='admin'?`<button onclick="delU('${u.id}')" style="padding:5px 10px;background:#FCEBEB;color:#791F1F;border:1px solid #F7C1C1;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">מחק</button>`:'<span style="font-size:10px;color:#888">ראשי</span>'}</div>`).join('')}</div></div>`;}

async function apprR(id,ok){
  const recs=gR();const r=recs.find(x=>x.id===id);if(!r)return;
  if(ok){
    r.approved=true;sR(recs);
    // Push to GitHub
    const token=GH.token();
    if(token){
      try{await GH.pushRecipe(r);alert(`✅ "${r.title}" אושר ושועתק ל-GitHub!`);}
      catch(e){alert(`✅ "${r.title}" אושר.\n⚠️ GitHub sync נכשל: ${e.message}`);}
    }else{alert(`✅ "${r.title}" אושר.\n💡 הגדר GitHub Token לשיתוף אוטומטי.`);}
  }else{recs.splice(recs.indexOf(r),1);sR(recs);alert(`✗ "${r.title}" נדחה`);}
  pgProfile();
}
function delU(id){if(!confirm('למחוק?'))return;sU(gU().filter(u=>u.id!==id));pgProfile();}
function doLogin(){const e=document.getElementById('li-e')?.value.trim(),p=document.getElementById('li-p')?.value;const u=gU().find(u=>u.email===e&&u.pass===p);const err=document.getElementById('li-err');if(!u){if(err){err.style.display='block';err.textContent='אימייל או סיסמה שגויים';}return;}CU=u;LS.set('cu',CU);pgProfile();}
function doLogout(){CU=null;LS.set('cu',null);pgProfile();}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
setAct('home');pgHome();

</script>
